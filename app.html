<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Keyguard Designer (browser, Phase 1)</title>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/build/three.module.min.js",
    "three/addons/": "./vendor/three/examples/jsm/"
  }
}
</script>
<style>
  /* ---------- reset / base ---------- */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: "Segoe UI", -apple-system, sans-serif;
               font-size: 13px; background: #f0f0f0; color: #222; }

  /* ---------- top menu bar ---------- */
  #menubar { display: flex; align-items: center; background: #e8e8e8; border-bottom: 1px solid #bbb;
             padding: 0 6px; height: 26px; flex-shrink: 0; user-select: none; }
  #menubar .menu { padding: 3px 10px; cursor: default; }
  #menubar .menu:hover { background: #d0d0d0; }
  #menubar .title { margin-left: auto; padding-right: 8px; color: #666; font-size: 12px; }

  /* ---------- main layout: row of (left column) + splitter + (right Customizer) ---------- */
  #app { display: flex; flex-direction: column; height: 100vh; }
  #main { display: flex; flex: 1; min-height: 0; }
  #left { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  #right { width: 280px; flex-shrink: 0; background: #fafafa; border-left: 1px solid #bbb;
           display: flex; flex-direction: column; min-width: 180px; }

  /* the left column is itself (viewport on top + horizontal splitter + console at bottom) */
  #viewport-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #viewport { flex: 1; background: #fffce0; position: relative; overflow: hidden; min-height: 0; }
  #three-canvas { display: block; width: 100%; height: 100%; }
  #viewport-overlay { position: absolute; top: 10px; left: 10px; right: 10px;
                       pointer-events: none; color: #555; font-size: 12px; }
  #viewport-status { background: rgba(255,255,255,0.85); padding: 6px 10px; border-radius: 3px;
                     display: inline-block; pointer-events: auto; }
  #viewport-status.rendering { color: #aa6; background: rgba(255,250,200,0.9); }
  #viewport-status.error { color: #c00; background: rgba(255,220,220,0.9); }
  #viewport-status.ok { color: #060; background: rgba(220,250,220,0.9); }
  #viewport-toolbar { height: 32px; background: #e8e8e8; border-top: 1px solid #ccc;
                      display: flex; align-items: center; gap: 4px; padding: 0 6px; flex-shrink: 0; }
  .vp-btn { background: none; border: 1px solid transparent; padding: 4px 6px; cursor: pointer;
            font-size: 14px; border-radius: 2px; color: #333; min-width: 26px; }
  .vp-btn:hover { background: #d8d8d8; border-color: #aaa; }
  .vp-sep { width: 1px; background: #bbb; height: 18px; margin: 0 4px; }

  /* ---------- console pane ---------- */
  #console-wrap { background: #fff; border-top: 1px solid #bbb; display: flex; flex-direction: column;
                  height: 180px; min-height: 60px; flex-shrink: 0; }
  #console-toolbar { display: flex; align-items: center; gap: 4px; padding: 4px 8px;
                     background: #ececec; border-bottom: 1px solid #ccc; flex-shrink: 0; font-size: 12px; }
  #console-toolbar .label { font-weight: bold; margin-right: auto; }
  #console-toolbar button { font-size: 11px; padding: 2px 8px; cursor: pointer; }
  #console-toolbar label { font-size: 11px; user-select: none; }
  #console { flex: 1; overflow-y: auto; padding: 6px 10px; font-family: Consolas, Menlo, monospace;
             font-size: 11.5px; color: #222; white-space: pre; }
  #console.wrap { white-space: pre-wrap; }

  /* ---------- splitters ---------- */
  .hsplit { width: 5px; background: #d4d4d4; cursor: col-resize; flex-shrink: 0;
            border-left: 1px solid #b8b8b8; border-right: 1px solid #b8b8b8; }
  .hsplit:hover { background: #b0c0e0; }
  .vsplit { height: 5px; background: #d4d4d4; cursor: row-resize; flex-shrink: 0;
            border-top: 1px solid #b8b8b8; border-bottom: 1px solid #b8b8b8; }
  .vsplit:hover { background: #b0c0e0; }

  /* ---------- Customizer ---------- */
  #cust-header { padding: 8px 10px; border-bottom: 1px solid #ddd; background: #f4f4f4; flex-shrink: 0; }
  #cust-header h2 { margin: 0 0 6px 0; font-size: 13px; font-weight: bold; }
  #cust-header .preset-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
  #cust-header select, #cust-header input { flex: 1; min-width: 0; font-size: 12px; padding: 2px 4px; }
  #cust-header button { font-size: 11px; padding: 2px 6px; cursor: pointer; }
  #cust-header .preset-btns { display: flex; gap: 4px; }
  #cust-header .preset-btns button { flex: 1; }
  #cust-sections { flex: 1; overflow-y: auto; }
  .section { border-bottom: 1px solid #e0e0e0; }
  .section-header { padding: 7px 10px; cursor: pointer; user-select: none;
                    display: flex; align-items: center; gap: 4px; font-weight: bold; font-size: 14px;
                    background: #fafafa; }
  .section-header:hover { background: #eef2f7; }
  .section-header .caret { display: inline-block; width: 10px; transition: transform 0.1s; color: #555; }
  .section.open .section-header .caret { transform: rotate(90deg); }
  .section-body { display: none; padding: 8px 10px 10px 10px; background: #fff; font-size: 12px; }
  .section.open .section-body { display: block; }
  .param { margin-bottom: 8px; }
  .param-label { display: block; font-weight: bold; margin-bottom: 2px; }
  .param-help { color: #777; font-size: 11px; margin-bottom: 3px; }
  .param select, .param input[type=text], .param input[type=number] {
    width: 100%; padding: 2px 4px; font-size: 12px; }

  /* ---------- splitter drag overlay (prevents iframe/text selection during drag) ---------- */
  .dragging, .dragging * { user-select: none !important; cursor: col-resize !important; }
  .dragging.row, .dragging.row * { cursor: row-resize !important; }

  /* ---------- split button ---------- */
  .split-btn { position: relative; display: inline-flex; }
  .split-btn .split-main { border-top-right-radius: 0; border-bottom-right-radius: 0; margin-right: 0; }
  .split-btn .split-arrow { border-top-left-radius: 0; border-bottom-left-radius: 0;
                             border-left: 1px solid #ccc; padding-left: 4px; padding-right: 4px;
                             min-width: 18px; }
  .split-menu { display: none; position: absolute; bottom: 100%; right: 0; background: #fff;
                border: 1px solid #aaa; box-shadow: 0 2px 6px rgba(0,0,0,0.15); z-index: 10;
                min-width: 220px; padding: 3px 0; }
  .split-menu.open { display: block; }
  .split-item { padding: 5px 12px; cursor: pointer; font-size: 12px; display: flex;
                justify-content: space-between; align-items: center; gap: 12px; }
  .split-item:hover { background: #e8f0fc; }
  .split-item .hint { color: #888; font-size: 11px; font-weight: normal; }

  /* ---------- dirty indicator ---------- */
  .preset-row select.dirty { font-style: italic; color: #a33; }
  #dirty-marker { color: #a33; font-weight: bold; margin-left: 4px; display: none; }
  #dirty-marker.visible { display: inline; }
  button:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ---------- Settings modal ---------- */
  #settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35);
                      display: none; align-items: center; justify-content: center; z-index: 1000; }
  #settings-overlay.open { display: flex; }
  #settings-modal { background: #fafafa; border: 1px solid #888; border-radius: 4px;
                    width: 560px; max-width: 90vw; height: 380px; max-height: 80vh;
                    display: flex; flex-direction: column; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  #settings-modal h3 { margin: 0; padding: 10px 14px; border-bottom: 1px solid #ccc;
                       background: #e8e8e8; font-size: 14px; }
  #settings-body { flex: 1; display: flex; min-height: 0; }
  #settings-cats { width: 140px; border-right: 1px solid #ccc; background: #f0f0f0; padding: 6px 0; }
  #settings-cats .cat { padding: 6px 14px; cursor: pointer; font-size: 12px; }
  #settings-cats .cat:hover { background: #e0e0e0; }
  #settings-cats .cat.active { background: #d8e6f8; color: #06c; font-weight: bold; }
  #settings-panel { flex: 1; padding: 14px; overflow: auto; font-size: 12px; }
  #settings-panel .setting { margin-bottom: 14px; }
  #settings-panel .setting > label { display: block; font-weight: bold; margin-bottom: 4px; }
  #settings-panel .setting .opt { display: block; margin: 2px 0; font-weight: normal; }
  #settings-footer { padding: 8px 14px; border-top: 1px solid #ccc; text-align: right; background: #f0f0f0; }
  #settings-footer button { padding: 4px 14px; font-size: 12px; cursor: pointer; }
</style>

<body>
<div id="app">

  <!-- ============ MAIN ROW: left column + Customizer ============ -->
  <div id="main">

    <!-- LEFT COLUMN: viewport on top, console at bottom -->
    <div id="left">

        <div id="viewport">
          <canvas id="three-canvas"></canvas>
          <div id="viewport-overlay">

        </div>
        <div id="viewport-toolbar">
          <button class="vp-btn" id="view-fit"    title="View All (fit to window)">⛶</button>
          <div class="vp-sep"></div>
          <button class="vp-btn" id="view-top"    title="Top view">⬒</button>
          <button class="vp-btn" id="view-bottom" title="Bottom view">⬓</button>
          <button class="vp-btn" id="view-front"  title="Front view">▤</button>
          <button class="vp-btn" id="view-back"   title="Back view">▥</button>
          <button class="vp-btn" id="view-left"   title="Left view">◧</button>

            <div class="split-menu" id="export-menu">

              <div class="split-item" data-fmt="SVG">Export as SVG <span class="hint">laser-cut</span></div>

            </div>

      <div class="vsplit" id="vsplit-console" title="Drag to resize console"></div>

      <div id="console-wrap">

          <h2 style="margin:0; flex:1;">Customizer</h2>
          <button id="open-project-btn" title="Pick a folder containing keyguard.scad and openings_and_additions.txt"
                  style="font-size:11px; padding:3px 8px; cursor:pointer;">Open Project…</button>
        </div>
        <div style="font-size:11px; color:#666; margin-bottom:6px;" id="project-folder-label">
          <i>no project folder open</i>

        <div class="preset-row">
          <select id="preset-select">
            <option value="design default values">design default values</option>
            <option value="Smith iPad AAC grid">Smith iPad AAC grid</option>

        <div class="preset-btns">

          <button id="del-preset-btn" title="Delete current preset">−</button>
          <button id="save-preset-btn" title="Save current parameters to current preset" disabled>Save preset</button>
          <button id="reset-btn" title="Revert parameters to current preset baseline" disabled>Reset</button>
        </div>

      <div id="cust-sections">
        <!-- sections — names taken verbatim from native screenshot -->

<!-- ============ Settings modal ============ -->
<div id="settings-overlay">
  <div id="settings-modal">
    <h3>Settings</h3>

      <div id="settings-cats">
        <div class="cat active" data-cat="general">General</div>

        <!-- panel content rendered by JS -->

<script type="module">
// ===== Three.js viewport setup =====
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { createOpenSCAD } from './openscad-wasm/openscad.js';
import { addFonts } from './openscad-wasm/openscad.fonts.js';

const canvas = document.getElementById('three-canvas');
const viewport = document.getElementById('viewport');
const statusEl = document.getElementById('viewport-status');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfffce0);

const camera = new THREE.PerspectiveCamera(40, 1, 1, 5000);
camera.position.set(200, 200, 300);
camera.up.set(0, 0, 1);   // Z-up to match OpenSCAD convention

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);

// Lighting tuned for Z-up: the "top" surface (clinician's view) faces +Z, so we want
// the strongest light coming from above with softer fill from below/sides.
const hemi = new THREE.HemisphereLight(0xffffff, 0xb0b0b0, 1.1);
hemi.position.set(0, 0, 1);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xffffff, 1.2);
key.position.set(1, 1, 2);
scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 0.6);
fill.position.set(-1, -0.5, 1);
scene.add(fill);
const back = new THREE.DirectionalLight(0xffffff, 0.4);
back.position.set(0, -1, -0.5);
scene.add(back);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
// Match OpenSCAD: left=rotate, right=pan, middle=rotate, wheel=zoom
controls.mouseButtons = {
  LEFT:   THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.ROTATE,
  RIGHT:  THREE.MOUSE.PAN
};

let currentMesh = null;          // Group containing keyguard + highlights meshes
let cameraFitOnce = false;       // true after we've framed the scene at least once for this project

function fitCameraToObject(object) {
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const fitDist = maxDim / (2 * Math.tan((camera.fov * Math.PI / 180) / 2));
  camera.position.copy(center.clone().add(new THREE.Vector3(maxDim * 0.9, -maxDim * 1.2, maxDim * 0.9)));
  controls.target.copy(center);
  camera.near = Math.max(1, fitDist / 100);
  camera.far  = fitDist * 100;
  camera.updateProjectionMatrix();
  controls.update();
}

// Move the camera to a Z-up orthographic-style view from `dir` and frame
// the current scene contents. `dir` is a unit-ish vector pointing FROM the
// scene TO the camera in OpenSCAD-style world coords (X right, Y forward, Z up).
function viewFromDirection(dir, upHint) {
  const target = currentMesh ? currentMesh : scene;
  const box = new THREE.Box3().setFromObject(target);
  if (box.isEmpty()) return;
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const fitDist = maxDim / (2 * Math.tan((camera.fov * Math.PI / 180) / 2)) * 1.5;
  const d = dir.clone().normalize().multiplyScalar(fitDist);
  camera.position.copy(center.clone().add(d));
  camera.up.copy(upHint);
  controls.target.copy(center);
  camera.near = Math.max(1, fitDist / 100);
  camera.far  = fitDist * 100;
  camera.updateProjectionMatrix();
  controls.update();
}

function resize() {
  const w = viewport.clientWidth, h = viewport.clientHeight;
  if (w === 0 || h === 0) return;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(viewport);
resize();

(function animate() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
})();

// ===== Axes + grid helpers (toggled by toolbar buttons) =====
let axesHelper = null;
let gridHelper = null;
function ensureAxes() {
  if (axesHelper) return;
  axesHelper = new THREE.AxesHelper(80);
  scene.add(axesHelper);
}
function ensureGrid() {
  if (gridHelper) return;
  // 400 mm × 400 mm grid, 20 mm cells; rotate so it lies in the XY plane (Z-up).
  gridHelper = new THREE.GridHelper(400, 20, 0xa0a0a0, 0xd0d0d0);
  gridHelper.rotation.x = Math.PI / 2;
  scene.add(gridHelper);
}
function toggleAxes() {
  if (axesHelper) { scene.remove(axesHelper); axesHelper.dispose && axesHelper.dispose(); axesHelper = null; }
  else ensureAxes();
}
function toggleGrid() {
  if (gridHelper) { scene.remove(gridHelper); gridHelper.dispose && gridHelper.dispose(); gridHelper = null; }
  else ensureGrid();
}

// ===== Viewport toolbar wiring =====
const Z_UP = new THREE.Vector3(0, 0, 1);
const Y_UP = new THREE.Vector3(0, 1, 0);
document.getElementById('view-fit').addEventListener('click', () => {
  if (currentMesh) fitCameraToObject(currentMesh);
});
document.getElementById('view-top')   .addEventListener('click', () => viewFromDirection(new THREE.Vector3( 0,  0,  1), Y_UP));
document.getElementById('view-bottom').addEventListener('click', () => viewFromDirection(new THREE.Vector3( 0,  0, -1), Y_UP));
document.getElementById('view-front') .addEventListener('click', () => viewFromDirection(new THREE.Vector3( 0, -1,  0), Z_UP));
document.getElementById('view-back')  .addEventListener('click', () => viewFromDirection(new THREE.Vector3( 0,  1,  0), Z_UP));
document.getElementById('view-left')  .addEventListener('click', () => viewFromDirection(new THREE.Vector3(-1,  0,  0), Z_UP));
document.getElementById('view-right') .addEventListener('click', () => viewFromDirection(new THREE.Vector3( 1,  0,  0), Z_UP));
document.getElementById('view-axes')  .addEventListener('click', toggleAxes);
document.getElementById('view-grid')  .addEventListener('click', toggleGrid);

// ===== Console wiring =====
const consoleEl = document.getElementById('console');
function logLine(text) {
  consoleEl.textContent += text + '\n';
  consoleEl.scrollTop = consoleEl.scrollHeight;
}
function logRaw(text) {
  consoleEl.textContent += text + '\n';
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

function setStatus(msg, kind = '') {
  // 'ok' and 'error' toasts are intentionally suppressed — the rendered
  // viewport and the console already tell the user the render succeeded
  // or failed, and the persistent toast was noisy. We still show the
  // initial open-project prompt and the in-progress "Rendering..." state.
  if (kind === 'ok' || kind === 'error') {
    statusEl.innerHTML = '';
    statusEl.className = '';
    statusEl.style.display = 'none';
    return;
  }
  statusEl.style.display = '';
  statusEl.innerHTML = msg;
  statusEl.className = kind;
}

// ===== Settings (app-wide, persisted in localStorage) =====
const SETTINGS_KEY = 'keyguard-spike:settings';
const SETTINGS_DEFAULTS = {
  presetOrder: 'alphabetical',   // 'alphabetical' | 'creation'
  renderBackend: 'Manifold',     // 'Manifold' (fast) | 'CGAL' (slow but more precise)
};
let settings = loadSettings();

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    const stored = raw ? JSON.parse(raw) : {};
    return { ...SETTINGS_DEFAULTS, ...stored };
  } catch {
    return { ...SETTINGS_DEFAULTS };
  }
}

function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

function setSetting(key, value) {
  settings[key] = value;
  saveSettings();
  onSettingsChanged(key);
}

function onSettingsChanged(key) {
  if (key === 'presetOrder' && project) {
    project.presetNames = orderedPresetNames(project.rawPresetNames);
    rebuildPresetDropdown();
  }
  if (key === 'renderBackend' && project) {
    // Re-render so the user immediately sees the effect of switching
    // backends (Manifold may leave precision artefacts that CGAL doesn't).
    doRender();
  }
}

// Sort preset names according to the current setting. 'design default values'
// is always pinned to the top regardless of mode.
function orderedPresetNames(rawNames) {
  const rest = rawNames.filter(n => n !== 'design default values');
  if (settings.presetOrder === 'creation') {
    return ['design default values', ...rest];
  }
  return ['design default values', ...rest.slice().sort((a, b) => a.localeCompare(b))];
}

function rebuildPresetDropdown() {
  const sel = document.getElementById('preset-select');
  if (!sel || !project) return;
  const current = project.currentPreset;
  sel.innerHTML = '';
  for (const n of project.presetNames) {
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    sel.appendChild(opt);
  }
  sel.value = current;
}

// ===== Project model =====
// A "project" is the contents of a folder the user picked:
//   scadName        e.g. "keyguard_v77.scad"
//   scadText        full text of the .scad file
//   jsonName        e.g. "keyguard_v77.json" (null if no presets file)
//   jsonText        full text of the .json file (null if no presets file)
//   oaText          text of openings_and_additions.txt ('' if missing)
//   files           map of all root-level files: { 'name.ext': Uint8Array }
//   presetNames     array of preset names ['design default values', ...]
//   currentPreset   currently selected preset name
let project = null;

// ===== Persisted last-opened folder =====
// FileSystemDirectoryHandle objects are structured-cloneable and can be stored
// in IndexedDB so we can re-open the same folder across reloads. On a fresh
// page load Chrome forgets the granted permission, but the handle remembers
// the location — one click + one permission dialog (covers read+write) gets
// us back in. We always request 'readwrite' upfront so a later Save Preset
// doesn't need a second prompt.
const HANDLE_DB = 'keyguard-spike-db';
const HANDLE_STORE = 'handles';
const HANDLE_KEY = 'lastProject';

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(HANDLE_DB, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(HANDLE_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGetHandle() {
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(HANDLE_STORE, 'readonly');
      const req = tx.objectStore(HANDLE_STORE).get(HANDLE_KEY);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch { return null; }
}
async function idbPutHandle(handle) {
  try {
    const db = await idbOpen();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(HANDLE_STORE, 'readwrite');
      tx.objectStore(HANDLE_STORE).put(handle, HANDLE_KEY);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch (e) { console.warn('Could not persist directory handle:', e); }
}
async function idbClearHandle() {
  try {
    const db = await idbOpen();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(HANDLE_STORE, 'readwrite');
      tx.objectStore(HANDLE_STORE).delete(HANDLE_KEY);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch {}
}

async function openProject() {
  if (!window.showDirectoryPicker) {
    alert('This browser does not support the File System Access API. Please use Chrome or Edge.');
    return;
  }
  let dirHandle = null;
  // If a project is already loaded, this click means "switch to a different
  // folder" — go straight to the picker. Otherwise, try to reuse the
  // last-opened folder on a fresh page load: requestPermission must be called
  // from a user gesture (the button click that drove us here), so this is
  // the right place. Chrome shows one prompt covering read+write.
  const isChangeProject = !!project;
  if (!isChangeProject) {
    const stored = await idbGetHandle();
    if (stored) {
      try {
        let perm = await stored.queryPermission({ mode: 'readwrite' });
        if (perm !== 'granted') perm = await stored.requestPermission({ mode: 'readwrite' });
        if (perm === 'granted') {
          dirHandle = stored;
        } else {
          logLine('Re-open of last folder was not approved — showing picker.');
        }
      } catch (e) {
        logLine(`Stored project handle could not be reused (${e.name || e.message}); showing picker.`);
        await idbClearHandle();
      }
    }
  }
  if (!dirHandle) {
    try {
      dirHandle = await window.showDirectoryPicker({ id: 'keyguard-project', mode: 'readwrite' });
    } catch (e) {
      if (e.name === 'AbortError') return;       // user cancelled
      throw e;
    }
    // Ensure write permission upfront so Save Preset doesn't re-prompt later.
    try {
      const perm = await dirHandle.requestPermission({ mode: 'readwrite' });
      if (perm !== 'granted') {
        logLine('Write permission was not granted — Save Preset will prompt again.');
      }
    } catch {}
  }
  await idbPutHandle(dirHandle);
  stopWatcher();
  // Re-frame the scene on the first render of the newly opened project.
  cameraFitOnce = false;
  logLine(`Opening project folder "${dirHandle.name}"...`);
  setStatus('Loading project...', 'rendering');

  // Enumerate root-level files
  const files = {};         // name → Uint8Array
  let scadName = null;
  let jsonName = null;
  let oaText = '';
  let oaMtime = null;

  try {
    for await (const [name, handle] of dirHandle.entries()) {
      if (handle.kind !== 'file') continue;       // ignore subfolders for now
      const file = await handle.getFile();
      const buf = new Uint8Array(await file.arrayBuffer());
      files[name] = buf;
      if (name === 'openings_and_additions.txt') oaMtime = file.lastModified;
      if (name.toLowerCase().endsWith('.scad')) {
        if (scadName) {
          logLine(`  WARNING: multiple .scad files found; using "${scadName}", ignoring "${name}"`);
        } else {
          scadName = name;
        }
      }
    }
  } catch (e) {
    // Most common cause: a stale handle persisted in IndexedDB still has
    // permission but points to a folder that has since been moved, renamed,
    // or deleted. Clear it so a subsequent click goes straight to the
    // directory picker instead of reusing the dead handle.
    if (e.name === 'NotFoundError' || /could not be found/i.test(e.message || '')) {
      await idbClearHandle();
      logLine(`  Stored folder is no longer accessible — cleared. Click "Open Project…" again and pick the folder.`);
      setStatus('Folder not found — click Open Project to pick it again.', 'error');
      return;
    }
    throw e;
  }
  if (!scadName) {
    setStatus('No .scad file found in selected folder.', 'error');
    logLine('  ERROR: project folder must contain exactly one .scad file');
    return;
  }
  // Matching json: same basename
  const base = scadName.replace(/\.scad$/i, '');
  const expectedJson = base + '.json';
  if (files[expectedJson]) jsonName = expectedJson;

  // Decode the text files
  const dec = new TextDecoder();
  const scadText = dec.decode(files[scadName]);
  const jsonText = jsonName ? dec.decode(files[jsonName]) : null;
  if (files['openings_and_additions.txt']) {
    oaText = dec.decode(files['openings_and_additions.txt']);
  } else {
    logLine('  no openings_and_additions.txt in folder — will use an empty one');
  }

  // Parse presets — keep raw (creation) order; apply user-chosen ordering separately
  let rawPresetNames = ['design default values'];
  if (jsonText) {
    try {
      const j = JSON.parse(jsonText);
      const sets = Object.keys(j.parameterSets || {});
      rawPresetNames = ['design default values', ...sets];
      logLine(`  loaded ${sets.length} preset(s) from ${jsonName}`);
    } catch (e) {
      logLine(`  ERROR parsing ${jsonName}: ${e.message}`);
    }
  } else {
    logLine('  no .json file found — only design defaults available');
  }
  const presetNames = orderedPresetNames(rawPresetNames);

  // Parse the .scad to build the Customizer schema
  const customizer = parseCustomizer(scadText);
  const totalParams = customizer.reduce((n, s) => n + s.params.length, 0);
  logLine(`  parsed Customizer: ${customizer.length} sections, ${totalParams} parameters`);

  project = { dirHandle, scadName, scadText, jsonName, jsonText, oaText, oaMtime, files,
              rawPresetNames, presetNames, currentPreset: presetNames[0], customizer, baselineParams: {},
              screenshotName: null, screenshotBytes: null, screenshotTexture: null,
              dims: null, warnedNoScreenshot: false };
  await rescanScreenshot();

  // UI updates
  document.getElementById('project-folder-label').innerHTML =
    `📁 <b>${dirHandle.name}</b> — ${scadName}<br>` +
    `<span style="color:#888;">click <b>Change Project…</b> above to switch folders</span>`;
  const opBtn = document.getElementById('open-project-btn');
  if (opBtn) {
    opBtn.textContent = 'Change Project…';
    opBtn.title = `Currently "${dirHandle.name}". Click to switch to a different folder.`;
  }
  const sel = document.getElementById('preset-select');
  sel.innerHTML = '';
  for (const n of presetNames) {
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    sel.appendChild(opt);
  }
  sel.value = project.currentPreset;

  // Build form and populate with values from the selected preset
  buildCustomizerForm(customizer);
  populateFormFromPreset(project.currentPreset);

  updateDelPresetButton();
  logLine(`Project ready — auto-rendering "${project.currentPreset}"...`);
  await doRender();
  startWatcher();
}

// ===== Render pipeline =====
async function doRender() {
  if (!project) {
    setStatus('Open a project folder first.', 'error');
    return;
  }
  if (renderInProgress) { pendingRerender = true; return; }
  renderInProgress = true;
  setStatus('Rendering...', 'rendering');
  try {
    // Build the base CLI args. Manifold backend (~100x faster than CGAL).
    //
    // WASM-only workaround: bump the designer's `fudge` / `ff` factor from
    // its native 0.01 mm to 0.05 mm. Manifold's precision floor treats sub-
    // 0.01 mm through-cuts as exact-coincident, leaving a thin floor on every
    // cell. 0.05 mm is 5x above that floor for typical tablet-scale models
    // and still well below a 3D-printer layer height, so it stays invisible
    // in the final print.
    //
    // Caveats / why not go higher:
    //   - The .scad file uses ff with hardcoded multipliers (e.g. `50*ff`
    //     and `2*ff` inside cut()/hole_cutter2). Bumping ff to 0.1 mm
    //     scales those offsets 10x and breaks the alignment between the
    //     cell cutters and the screen-region recess cutter — cells stop
    //     reaching the top face of the keyguard. 0.05 mm is the largest
    //     value we can apply globally without those secondary effects.
    //   - As a result the "App layout in mm > ~5 mm leaves a thin cell
    //     floor" case still recurs at extreme offsets. That's a SCAD-side
    //     issue (Manifold's precision floor scales with coordinate
    //     magnitudes) and needs a SCAD-side fix, not a fudge bump here.
    //
    // Order matters: OpenSCAD applies -p/-P preset values AFTER preceding -D
    // values, so the fudge/ff overrides MUST come after the preset switch — or
    // a preset that pins fudge=0.01 (like "highlight test") will clobber the
    // workaround and the Manifold precision floor floors all the cells.
    const baseArgs = [`--backend=${settings.renderBackend}`];
    if (project.jsonText && project.currentPreset !== 'design default values') {
      baseArgs.push('-p', '/' + project.jsonName, '-P', project.currentPreset);
    }
    baseArgs.push('-D', 'fudge=0.05', '-D', 'ff=0.05');
    // include_screenshot is honoured by the spike's Three.js plane overlay,
    // not by keyguard.scad's own SVG import — the .scad version renders a flat
    // slab inside the screen recess which fills every cell with a "floor".
    // Force the .scad's handling off; we add the screenshot ourselves below.
    baseArgs.push('-D', 'include_screenshot="no"');
    if (project.customizer) {
      const cur = currentFormValues();
      const baseline = project.baselineParams || {};
      const typeMap = {};
      for (const sec of project.customizer)
        for (const p of sec.params) typeMap[p.name] = p.valueType;
      let overrideCount = 0;
      for (const [name, val] of Object.entries(cur)) {
        if (baseline[name] === val) continue;
        if (name === 'fudge' || name === 'ff') continue;   // never let UI clobber the workaround
        if (name === 'include_screenshot') continue;       // spike-managed; .scad must stay "no"
        const t = typeMap[name];
        const expr = (t === 'string')
          ? `"${String(val).replace(/"/g, '\\"')}"`
          : String(val);
        baseArgs.push('-D', `${name}=${expr}`);
        overrideCount++;
      }
      if (overrideCount) logLine(`  applying ${overrideCount} parameter override(s)`);
    }

    // The createOpenSCAD wrapper's callMain triggers exitJS() at the end of
    // every run, which tears down the Emscripten runtime. The instance can
    // therefore only do one render, so we spin up a fresh instance per render.
    // Captures the swm/shm/sat/kt values emitted by keyguard.scad's
    // `echo("__SPIKE_DIMS__", ...)` line so the screenshot plane can be sized
    // and positioned correctly. The echo is on stderr from the wasm.
    function maybeCaptureDims(line) {
      if (!line.includes('__SPIKE_DIMS__')) return;
      const m = line.match(/swm\s*=\s*(-?\d+(?:\.\d+)?)/);
      const m2 = line.match(/shm\s*=\s*(-?\d+(?:\.\d+)?)/);
      const m3 = line.match(/sat\s*=\s*(-?\d+(?:\.\d+)?)/);
      const m4 = line.match(/kt\s*=\s*(-?\d+(?:\.\d+)?)/);
      if (m && m2 && m3 && m4) {
        project.dims = { swm: +m[1], shm: +m2[1], sat: +m3[1], kt: +m4[1] };
      }
    }

    // Lines we know are pure noise from openscad-wasm and don't want
    // surfaced in the user-facing console.
    //   - "Viewall and autocenter disabled in favor of $vp*" fires on
    //     every render because keyguard.scad sets $vp_* viewport vars.
    //   - "Current top level object is empty." is the expected stderr
    //     line from the highlights render when there are no '#'-flagged
    //     O&A rows and no embossed/engraved text — the empty-highlights
    //     case is handled silently by the >200-byte STL guard below.
    let suppressedEmpty = false;
    function isNoise(t) {
      if (/Viewall and autocenter disabled/i.test(t)) return true;
      if (/Current top level object is empty/i.test(t)) {
        suppressedEmpty = true;
        return true;
      }
      return false;
    }
    async function runOnce(extraArgs, outPath, label) {
      logLine(`Initializing openscad-wasm for ${label}...`);
      suppressedEmpty = false;
      const oscad = await createOpenSCAD({
        print:    t => { if (!isNoise(t)) logRaw(t); maybeCaptureDims(t); },
        printErr: t => { if (!isNoise(t)) logRaw(t); maybeCaptureDims(t); }
      });
      // Install OpenSCAD's bundled fonts (Liberation Sans + fontconfig)
      // into the virtual FS so text() primitives render. Without this,
      // keyguard.scad's embossed labels come out blank in the wasm build.
      addFonts(oscad.getInstance());
      const fs = oscad.getInstance().FS;
      fs.writeFile('/' + project.scadName, project.scadText);
      fs.writeFile('/openings_and_additions.txt', project.oaText);
      if (project.jsonText) fs.writeFile('/' + project.jsonName, project.jsonText);
      for (const [name, bytes] of Object.entries(project.files)) {
        if (name === project.scadName) continue;
        if (name === project.jsonName) continue;
        if (name === 'openings_and_additions.txt') continue;
        fs.writeFile('/' + name, bytes);
      }
      const args = ['/' + project.scadName, '-o', outPath, ...baseArgs, ...extraArgs];
      logLine(`Rendering ${label} (${args.length - 4} extra args)`);
      const t0 = performance.now();
      const rc = oscad.getInstance().callMain(args);
      const elapsed = (performance.now() - t0) / 1000;
      if (rc !== 0) {
        // Highlights render returning rc=1 with the "Current top level
        // object is empty" stderr just means there's nothing to highlight
        // (no '#' rows, no embossed text). That's the normal path, not
        // an error — stay quiet.
        if (label === 'highlights' && suppressedEmpty) {
          return { elapsed, bytes: null };
        }
        logLine(`  ${label} render returned code ${rc}`);
        return { elapsed, bytes: null };
      }
      let bytes = null;
      try { bytes = fs.readFile(outPath); }
      catch (e) { logLine(`  no ${outPath} produced: ${e.message}`); }
      if (bytes) logLine(`  ${outPath}: ${bytes.length.toLocaleString()} bytes in ${elapsed.toFixed(1)}s`);
      return { elapsed, bytes };
    }

    // ---- Render 1: keyguard (no overlays) ----
    // This wasm has no 3MF export, so STL drops any color() attribute.
    // We therefore render the keyguard and the highlight overlays separately,
    // load each as its own mesh, and apply Three.js materials per role.
    const kg = await runOnce(['-D', 'show_oa_highlights="no"'], '/keyguard.stl', 'keyguard');
    if (!kg.bytes) throw new Error('keyguard render produced no STL');
    const kgBytes = kg.bytes;
    const tkElapsed = kg.elapsed;

    // ---- Render 2: overlays only ----
    // Gated by only_oa_highlights — keyguard.scad must skip keyguard() and
    // emit just the O&A highlight shapes when this is "yes".
    const hl = await runOnce(['-D', 'only_oa_highlights="yes"'], '/highlights.stl', 'highlights');
    const hlBytes = hl.bytes;
    const thElapsed = hl.elapsed;

    // ---- Assemble scene ----
    const loader = new STLLoader();
    const toAB = u8 => u8.buffer.slice(u8.byteOffset, u8.byteOffset + u8.byteLength);
    const kgGeom = loader.parse(toAB(kgBytes));
    kgGeom.computeVertexNormals();
    const kgMat = new THREE.MeshPhongMaterial({ color: 0x7dd9c8, shininess: 30, flatShading: false });
    const kgMesh = new THREE.Mesh(kgGeom, kgMat);

    const group = new THREE.Group();
    group.add(kgMesh);

    // The STL writer emits a single-triangle "empty" shell when there is no
    // overlay geometry — guard against tiny/empty files so we don't draw a
    // stray pink speck at the origin.
    if (hlBytes && hlBytes.length > 200) {
      const hlGeom = loader.parse(toAB(hlBytes));
      hlGeom.computeVertexNormals();
      const hlMat = new THREE.MeshPhongMaterial({
        color: 0xff4d4d,
        opacity: 0.45,
        transparent: true,
        depthWrite: false,
        shininess: 10,
      });
      const hlMesh = new THREE.Mesh(hlGeom, hlMat);
      hlMesh.renderOrder = 1;        // draw overlays after the keyguard
      group.add(hlMesh);
    }

    // ---- Optional screenshot plane below the keyguard ----
    // Sits at the bottom of the screen recess so the clinician sees the
    // referenced app screenshot through the cell cutouts. Sized to swm × shm
    // captured from keyguard.scad's __SPIKE_DIMS__ echo. Honours the
    // include_screenshot Customizer parameter.
    const cur = currentFormValues();
    const wantScreenshot = cur.include_screenshot === 'yes';
    if (wantScreenshot) {
      if (!project.screenshotName) {
        if (!project.warnedNoScreenshot) {
          project.warnedNoScreenshot = true;
          alert('include_screenshot is "yes" but no .jpg, .jpeg, or .png file was found in the project folder.');
        }
      } else if (project.dims && project.screenshotTexture) {
        const { swm, shm, kt } = project.dims;
        const plane = new THREE.Mesh(
          new THREE.PlaneGeometry(swm, shm),
          new THREE.MeshBasicMaterial({ map: project.screenshotTexture, side: THREE.DoubleSide })
        );
        plane.position.set(0, 0, -kt / 2 - 0.05);
        group.add(plane);
      }
    }

    if (currentMesh) scene.remove(currentMesh);
    currentMesh = group;
    scene.add(currentMesh);

    // Preserve the user's framing across O&A edits, parameter changes, and
    // preset switches. Re-fit only on the very first render of a project,
    // or when the design itself is being viewed at an angle (the .scad has
    // tilted the keyguard via keyguard_display_angle), since that materially
    // changes the bounding box orientation in a way the previous framing
    // won't accommodate.
    const angleStr = cur.keyguard_display_angle;
    const angleNonZero = angleStr !== undefined && Number(angleStr) !== 0;
    if (!cameraFitOnce || angleNonZero) {
      fitCameraToObject(currentMesh);
      cameraFitOnce = true;
    }

    const totalElapsed = tkElapsed + thElapsed;
    setStatus(`Rendered in ${totalElapsed.toFixed(1)} s`, 'ok');
  } catch (e) {
    logLine('Render failed: ' + e.message);
    setStatus('Render failed: ' + e.message, 'error');
    console.error(e);
  } finally {
    renderInProgress = false;
    if (pendingRerender) {
      pendingRerender = false;
      setTimeout(doRender, 0);
    }
  }
}

// Manifold backend renders in < 1 s, so there is no explicit Render button.
// Renders are triggered automatically on Open Project and on preset change.

// Export does a SECOND OpenSCAD render in the user's chosen format, without the
// show_oa_highlights override — so exported files contain pure keyguard
// geometry with no translucent overlay artefacts baked in.
const EXPORT_FORMATS = {
  STL: { ext: 'stl', mime: 'model/stl' },
  SVG: { ext: 'svg', mime: 'image/svg+xml' },
  // 3MF removed: the bundled openscad-wasm build does not include lib3mf,
  // so attempting --export-format=3mf fails with "Export to 3MF format was
  // not enabled when building the application."
};

async function exportCurrent(fmt) {
  if (!project) { alert('Open a project first.'); return; }
  const spec = EXPORT_FORMATS[fmt];
  if (!spec) { alert(`Unknown export format: ${fmt}`); return; }
  const prevStatusText = statusEl.innerHTML;
  const prevStatusKind = statusEl.className;
  setStatus(`Exporting as ${fmt}...`, 'rendering');
  try {
    const oscad = await createOpenSCAD({
      print:    t => logRaw(t),
      printErr: t => logRaw(t)
    });
    addFonts(oscad.getInstance());
    const fs = oscad.getInstance().FS;
    fs.writeFile('/' + project.scadName, project.scadText);
    fs.writeFile('/openings_and_additions.txt', project.oaText);
    if (project.jsonText) fs.writeFile('/' + project.jsonName, project.jsonText);
    for (const [name, bytes] of Object.entries(project.files)) {
      if (name === project.scadName) continue;
      if (name === project.jsonName) continue;
      if (name === 'openings_and_additions.txt') continue;
      fs.writeFile('/' + name, bytes);
    }
    const outPath = '/keyguard.' + spec.ext;
    // Order matters: -D values placed after -p/-P win against the preset.
    // A preset that pins fudge=0.01 (e.g. "highlight test") would otherwise
    // clobber our Manifold-precision workaround and leave cell floors in
    // the exported file.
    const args = ['/' + project.scadName, '-o', outPath, `--backend=${settings.renderBackend}`];
    if (project.jsonText && project.currentPreset !== 'design default values') {
      args.push('-p', '/' + project.jsonName, '-P', project.currentPreset);
    }
    args.push('-D', 'fudge=0.05', '-D', 'ff=0.05');
    // Exports should never bake in the screenshot overlay (it's a viewport-only
    // alignment aid). Force the .scad's SVG import off regardless of preset/form.
    args.push('-D', 'include_screenshot="no"');
    if (project.customizer) {
      const cur = currentFormValues();
      const baseline = project.baselineParams || {};
      const typeMap = {};
      for (const sec of project.customizer)
        for (const p of sec.params) typeMap[p.name] = p.valueType;
      for (const [name, val] of Object.entries(cur)) {
        if (baseline[name] === val) continue;
        if (name === 'fudge' || name === 'ff') continue;
        if (name === 'include_screenshot') continue;
        const t = typeMap[name];
        const expr = (t === 'string')
          ? `"${String(val).replace(/"/g, '\\"')}"`
          : String(val);
        args.push('-D', `${name}=${expr}`);
      }
    }
    const t0 = performance.now();
    const rc = oscad.getInstance().callMain(args);
    const elapsed = (performance.now() - t0) / 1000;
    if (rc !== 0) throw new Error(`OpenSCAD exited with code ${rc}`);
    const bytes = fs.readFile(outPath);
    logLine(`Export render (${fmt}) complete in ${elapsed.toFixed(1)}s. ${bytes.length.toLocaleString()} bytes`);
    const url = URL.createObjectURL(new Blob([bytes], { type: spec.mime }));
    const a = document.createElement('a');
    a.href = url;
    a.download = 'keyguard.' + spec.ext;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 0);
    setStatus(prevStatusText, prevStatusKind);
  } catch (e) {
    logLine('Export failed: ' + e.message);
    setStatus('Export failed: ' + e.message, 'error');
    console.error(e);
  }
}

// ===== The rest of the original mockup logic follows =====

// ---------- Customizer sections (names from native screenshot) ----------
// ===== Customizer parser =====
// Parses keyguard.scad's top-of-file Customizer declarations into a structured schema.
// Recognises:
//   /*[Section Name]*/                          — start of a section
//   /*[Hidden]*/                                — end of customizer-visible region
//   name = default;                             — plain param (number, string, vector)
//   name = default; // [a,b,c]                  — dropdown
//   name = default; // [a:b]                    — range slider [min:max]
//   name = default; // [a:b:c]                  — range slider [min:step:max]
//   name = default; // .1                       — numeric step hint, freeform input
//   name = default; // any other text           — help/hint shown as tooltip
// A line starting with `//` immediately above a parameter is captured as its help text.
function parseCustomizer(scadText) {
  const lines = scadText.split(/\r?\n/);
  const sections = [];
  let currentSection = null;
  let pendingHelp = [];

  for (const raw of lines) {
    const line = raw.trim();
    if (line === '') { pendingHelp = []; continue; }

    // Stop at the Hidden section or at the first module/function definition
    const sectionMatch = line.match(/^\/\*\s*\[(.+?)\]\s*\*\//);
    if (sectionMatch) {
      const name = sectionMatch[1].trim();
      if (name.toLowerCase() === 'hidden') break;
      currentSection = { name, params: [] };
      sections.push(currentSection);
      pendingHelp = [];
      continue;
    }
    if (/^(module|function)\s+\w+/.test(line)) break;

    // Capture preceding help comments
    if (line.startsWith('//')) {
      pendingHelp.push(line.replace(/^\/\/\s?/, ''));
      continue;
    }

    // Parameter declaration: name = value;  with optional trailing comment
    const paramMatch = line.match(/^([a-zA-Z_]\w*)\s*=\s*(.+?);\s*(\/\/\s*(.*))?$/);
    if (paramMatch && currentSection) {
      const [, name, rawDefault, , trailing] = paramMatch;
      const def = rawDefault.trim();
      const help = pendingHelp.join(' ').trim();
      pendingHelp = [];

      // Determine value type from default
      let valueType;
      if (/^".*"$/.test(def)) valueType = 'string';
      else if (/^\[.*\]$/.test(def)) valueType = 'vector';
      else if (/^-?\d+(\.\d+)?$/.test(def)) valueType = 'number';
      else valueType = 'string';   // catch-all

      // Determine control type from trailing comment
      let control = { kind: valueType };
      if (trailing) {
        const t = trailing.trim();
        const bracketMatch = t.match(/^\[(.*)\]$/);
        if (bracketMatch) {
          const inside = bracketMatch[1];
          // Range: number:number or number:number:number
          const rangeParts = inside.split(':').map(s => s.trim());
          const allNumeric = rangeParts.every(p => /^-?\d+(\.\d+)?$/.test(p));
          if (rangeParts.length === 2 && allNumeric) {
            control = { kind: 'range', min: +rangeParts[0], max: +rangeParts[1] };
          } else if (rangeParts.length === 3 && allNumeric) {
            control = { kind: 'range', min: +rangeParts[0], step: +rangeParts[1], max: +rangeParts[2] };
          } else {
            // Comma-separated dropdown values; each may be "value:label" or just "value"
            const choices = inside.split(',').map(s => {
              const parts = s.split(':').map(x => x.trim());
              if (parts.length === 2) return { value: parts[0], label: parts[1] };
              return { value: parts[0], label: parts[0] };
            });
            control = { kind: 'dropdown', choices };
          }
        } else if (/^\.\d+$/.test(t) || /^-?\d+(\.\d+)?$/.test(t)) {
          // numeric step hint like ".1" or "1"
          control = { kind: 'number', step: +t };
        } else {
          // Trailing text becomes additional help if not bracketed
          // (we'll show it in the help line)
        }
      }
      if (control.kind === 'string' && valueType === 'string' && !trailing) {
        control = { kind: 'string' };
      }

      currentSection.params.push({ name, default: def, valueType, control, help });
    }
  }
  return sections;
}

// ===== Form generation =====
const container = document.getElementById('cust-sections');

function buildCustomizerForm(sections) {
  container.innerHTML = '';
  for (const sec of sections) {
    const div = document.createElement('div');
    div.className = 'section';
    div.dataset.section = sec.name;
    div.innerHTML = `<div class="section-header"><span class="caret">▶</span>${sec.name}</div>
                     <div class="section-body"></div>`;
    const body = div.querySelector('.section-body');
    for (const p of sec.params) {
      body.appendChild(buildParamControl(p));
    }
    container.appendChild(div);
  }
}

function buildParamControl(p) {
  const wrap = document.createElement('div');
  wrap.className = 'param';
  wrap.dataset.paramName = p.name;

  const label = document.createElement('label');
  label.className = 'param-label';
  label.textContent = p.name.replace(/_/g, ' ');
  wrap.appendChild(label);

  if (p.help) {
    const helpEl = document.createElement('div');
    helpEl.className = 'param-help';
    helpEl.textContent = p.help;
    wrap.appendChild(helpEl);
  }

  let input;
  switch (p.control.kind) {
    case 'dropdown': {
      input = document.createElement('select');
      for (const c of p.control.choices) {
        const opt = document.createElement('option');
        opt.value = c.value; opt.textContent = c.label;
        input.appendChild(opt);
      }
      break;
    }
    case 'range': {
      input = document.createElement('input');
      input.type = 'number';
      input.min = p.control.min;
      input.max = p.control.max;
      if (p.control.step != null) input.step = p.control.step;
      break;
    }
    case 'number': {
      input = document.createElement('input');
      input.type = 'number';
      if (p.control.step != null) input.step = p.control.step;
      break;
    }
    case 'vector':
    case 'string':
    default: {
      input = document.createElement('input');
      input.type = 'text';
      break;
    }
  }
  input.dataset.paramName = p.name;
  input.dataset.valueType = p.valueType;
  wrap.appendChild(input);
  return wrap;
}

// Click to expand/collapse
container.addEventListener('click', e => {

// ===== Populate form values from a preset =====
// Preset values come from the .json file (all strings) or, for "design default values",
// from the .scad defaults captured during parsing.
function populateFormFromPreset(presetName) {
  if (!project || !project.customizer) return;
  const presets = project.jsonText ? (JSON.parse(project.jsonText).parameterSets || {}) : {};
  const presetVals = presets[presetName] || null;

  for (const sec of project.customizer) {
    for (const p of sec.params) {
      const input = container.querySelector(`[data-param-name="${cssEsc(p.name)}"] input, [data-param-name="${cssEsc(p.name)}"] select`);
      if (!input) continue;
      let val;
      if (presetVals && p.name in presetVals) {
        val = presetVals[p.name];
      } else {
        // Use the .scad default; strip surrounding quotes for strings.
        val = p.default.replace(/^"|"$/g, '');
      }
      input.value = val;
    }
  }
  // Snapshot the baseline so dirty-state comparisons work
  project.baselineParams = currentFormValues();
  updateDirty();
}

function cssEsc(s) { return s.replace(/"/g, '\\"'); }

function currentFormValues() {
  const out = {};
  for (const el of container.querySelectorAll('input,select')) {
    if (!el.dataset.paramName) continue;
    out[el.dataset.paramName] = el.value;
  }
  return out;
}

// ===== Param change → dirty update + re-render =====
let renderDebounceTimer = null;
function scheduleRender() {
  if (!project) return;
  clearTimeout(renderDebounceTimer);
  renderDebounceTimer = setTimeout(() => doRender(), 400);
}

// ===== File watcher for openings_and_additions.txt =====
// Polls the project folder every WATCH_INTERVAL_MS for changes to the O&A file
// and triggers a re-render when its lastModified timestamp changes.
const WATCH_INTERVAL_MS = 1500;
let watchTimer = null;
let renderInProgress = false;
let pendingRerender = false;

function setWatchStatus(text, color = '#888') {
  const el = document.getElementById('watch-status');
  if (!el) return;
  el.textContent = text;
  el.style.color = color;
}

function stopWatcher() {
  if (watchTimer) { clearInterval(watchTimer); watchTimer = null; }
  setWatchStatus('');
}

function startWatcher() {
  if (!project || !project.dirHandle) return;
  stopWatcher();
  setWatchStatus('👁 watching openings_and_additions.txt');
  watchTimer = setInterval(checkOAFile, WATCH_INTERVAL_MS);
}

async function checkOAFile() {
  if (!project || !project.dirHandle) return;
  let fileHandle, file;
  try {
    fileHandle = await project.dirHandle.getFileHandle('openings_and_additions.txt');
    file = await fileHandle.getFile();
  } catch (e) {
    // File missing — note state and keep polling (it may reappear).
    if (project.oaText !== '') {
      logLine('openings_and_additions.txt was deleted — re-rendering with empty O&A');
      project.oaText = '';
      project.oaMtime = null;
      setWatchStatus('👁 watching — file not found', '#a60');
      triggerWatchRerender();
    } else {
      setWatchStatus('👁 watching — file not found', '#a60');
    }
    return;
  }
  const mtime = file.lastModified;
  if (project.oaMtime == null) {
    // File just appeared after being absent.
    project.oaMtime = mtime;
    project.oaText = await file.text();
    logLine('openings_and_additions.txt appeared — re-rendering');
    setWatchStatus('👁 watching openings_and_additions.txt');
    triggerWatchRerender();
    return;
  }
  if (mtime !== project.oaMtime) {
    project.oaMtime = mtime;
    project.oaText = await file.text();
    logLine('openings_and_additions.txt changed on disk — re-rendering');
    triggerWatchRerender();
  }
}

// ===== Screenshot-under-keyguard plane =====
// Scans the project folder for the FIRST .jpg/.jpeg/.png and caches the bytes
// + a Three.js texture. Called on Open Project, on preset change, and when
// include_screenshot flips to "yes" — so swapping the image file on disk and
// switching presets are both reflected on the next render. SVG files are
// intentionally ignored (Three.js can't texture them without a rasterisation
// step we've deferred — see project_browser_spike memory note).
async function rescanScreenshot() {
  if (!project || !project.dirHandle) return;
  const old = project.screenshotTexture;
  project.screenshotName = null;
  project.screenshotBytes = null;
  project.screenshotTexture = null;
  if (old) old.dispose();

  const imageExt = /\.(jpe?g|png)$/i;
  try {
    for await (const [name, handle] of project.dirHandle.entries()) {
      if (handle.kind !== 'file') continue;
      if (!imageExt.test(name)) continue;
      const file = await handle.getFile();
      const bytes = new Uint8Array(await file.arrayBuffer());
      const mime = name.toLowerCase().endsWith('.png') ? 'image/png' : 'image/jpeg';
      const url = URL.createObjectURL(new Blob([bytes], { type: mime }));
      const tex = await new Promise((resolve, reject) => {
        new THREE.TextureLoader().load(url, t => { URL.revokeObjectURL(url); resolve(t); },
          undefined, err => { URL.revokeObjectURL(url); reject(err); });
      });
      tex.colorSpace = THREE.SRGBColorSpace;
      project.screenshotName = name;
      project.screenshotBytes = bytes;
      project.screenshotTexture = tex;
      project.warnedNoScreenshot = false;
      logLine(`Screenshot: using "${name}"`);
      return;
    }
  } catch (e) {
    logLine(`Screenshot scan failed: ${e.message}`);
  }
  logLine('Screenshot: no .jpg/.jpeg/.png in project folder');
}

function triggerWatchRerender() {
  if (renderInProgress) {
    pendingRerender = true;
    return;
  }
  doRender();
}

function updateDirty() {
  if (!project) return;
  const cur = currentFormValues();
  const base = project.baselineParams || {};
  let dirty = false;
  for (const k of Object.keys(cur)) {
    if (String(cur[k]) !== String(base[k] ?? '')) { dirty = true; break; }
  }
  document.getElementById('dirty-marker').classList.toggle('visible', dirty);
  document.getElementById('preset-select').classList.toggle('dirty', dirty);
  document.getElementById('save-preset-btn').disabled = !dirty;
  document.getElementById('reset-btn').disabled = !dirty;
}

container.addEventListener('input', e => {
  if (!project || !e.target.dataset.paramName) return;
  updateDirty();
  // For numeric inputs, defer the render until the user commits the value
  // (blur or Enter — both fire 'change'). Otherwise every keystroke while
  // typing a multi-digit number triggers a render off the in-flight value.
  if (e.target.tagName === 'INPUT' && e.target.type === 'number') return;
  scheduleRender();
});
container.addEventListener('change', async e => {
  if (!project || !e.target.dataset.paramName) return;
  updateDirty();
  // Rescan for the screenshot when the user flips include_screenshot ON, so
  // a folder change since Open Project gets picked up.
  if (e.target.dataset.paramName === 'include_screenshot' && e.target.value === 'yes') {
    await rescanScreenshot();
  }
  scheduleRender();
});

// ---------- splitter drag logic ----------
function makeHSplit(el, leftEl, rightEl) {
  el.addEventListener('mousedown', e => {
    e.preventDefault();
    document.body.classList.add('dragging');
    const startX = e.clientX;
    const startW = rightEl.getBoundingClientRect().width;
    function move(ev) {
      const dx = ev.clientX - startX;
      const newW = Math.max(180, Math.min(700, startW - dx));
      rightEl.style.width = newW + 'px';
    }
    function up() {
      document.body.classList.remove('dragging');
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  });
}
function makeVSplit(el, topEl, bottomEl) {
  el.addEventListener('mousedown', e => {
    e.preventDefault();
    document.body.classList.add('dragging', 'row');
    const startY = e.clientY;
    const startH = bottomEl.getBoundingClientRect().height;
    function move(ev) {
      const dy = ev.clientY - startY;
      const newH = Math.max(60, Math.min(600, startH - dy));
      bottomEl.style.height = newH + 'px';
    }
    function up() {
      document.body.classList.remove('dragging', 'row');
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  });
}

// ===== Save preset: write current form values back to the project's .json =====
async function ensureWritePermission() {
  const h = project.dirHandle;
  if ((await h.queryPermission({ mode: 'readwrite' })) === 'granted') return true;
  return (await h.requestPermission({ mode: 'readwrite' })) === 'granted';
}

function buildPresetJson(parameterSets) {
  // Match the on-disk format produced by OpenSCAD: 4-space indent, parameter
  // keys sorted alphabetically within each preset, preset names left in
  // insertion (creation) order so newly added presets land at the end.
  // The pull-down list does its own ordering based on the Settings preference.
  const out = {};
  for (const name of Object.keys(parameterSets)) {
    const params = parameterSets[name];
    const sorted = {};
    for (const k of Object.keys(params).sort((a, b) => a.localeCompare(b))) sorted[k] = params[k];
    out[name] = sorted;
  }
  return JSON.stringify({ parameterSets: out, fileFormatVersion: '1' }, null, 4) + '\n';
}

// Writes the current form values into parameterSets under `presetName` and
// flushes the .json to disk. Used by both Save Preset and Add Preset.
async function writePresetToDisk(presetName) {
  if (!(await ensureWritePermission())) {
    logLine('Write permission was not granted.');
    return false;
  }
  const existing = project.jsonText ? JSON.parse(project.jsonText) : { parameterSets: {} };
  const parameterSets = existing.parameterSets || {};

  const cur = currentFormValues();
  const asStrings = {};
  for (const [k, v] of Object.entries(cur)) asStrings[k] = String(v);
  parameterSets[presetName] = asStrings;

  const newText = buildPresetJson(parameterSets);
  const jsonName = project.jsonName || project.scadName.replace(/\.scad$/i, '') + '.json';
  const fileHandle = await project.dirHandle.getFileHandle(jsonName, { create: true });
  const writable = await fileHandle.createWritable();
  await writable.write(newText);
  await writable.close();

  project.jsonText = newText;
  project.jsonName = jsonName;
  if (!project.rawPresetNames.includes(presetName)) {
    project.rawPresetNames.push(presetName);
    project.presetNames = orderedPresetNames(project.rawPresetNames);
  }
  return true;
}

savePresetBtn.addEventListener('click', async () => {
  if (!project) return;
  if (project.currentPreset === 'design default values') {
    alert('"design default values" is read-only. Use the + button to create a new preset.');
    return;
  }
  try {
    if (!(await writePresetToDisk(project.currentPreset))) return;
    rebuildPresetDropdown();
    project.baselineParams = currentFormValues();
    updateDirty();
    logLine(`Saved preset "${project.currentPreset}" to ${project.jsonName}`);
  } catch (e) {
    logLine('Save preset failed: ' + e.message);
    console.error(e);
  }
});

function updateDelPresetButton() {
  const btn = document.getElementById('del-preset-btn');
  if (!btn) return;
  btn.disabled = !project || project.currentPreset === 'design default values';
}

document.getElementById('del-preset-btn').addEventListener('click', async () => {
  if (!project) return;
  const name = project.currentPreset;
  if (name === 'design default values') return;
  // Request write permission BEFORE confirm(); confirm() consumes user activation
  // and would cause requestPermission() to throw.
  if (!(await ensureWritePermission())) {
    logLine('Delete preset: write permission was not granted.');
    return;
  }
  if (!confirm(`Delete preset "${name}"? This cannot be undone.`)) return;
  try {
    const existing = project.jsonText ? JSON.parse(project.jsonText) : { parameterSets: {} };
    const parameterSets = existing.parameterSets || {};
    delete parameterSets[name];

    const newText = buildPresetJson(parameterSets);
    const jsonName = project.jsonName || project.scadName.replace(/\.scad$/i, '') + '.json';
    const fileHandle = await project.dirHandle.getFileHandle(jsonName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(newText);
    await writable.close();

    project.jsonText = newText;
    project.jsonName = jsonName;
    project.rawPresetNames = project.rawPresetNames.filter(n => n !== name);
    project.presetNames = orderedPresetNames(project.rawPresetNames);
    project.currentPreset = 'design default values';
    rebuildPresetDropdown();
    populateFormFromPreset(project.currentPreset);
    updateDelPresetButton();
    logLine(`Deleted preset "${name}" from ${jsonName}`);
    doRender();
  } catch (e) {
    logLine('Delete preset failed: ' + e.message);
    console.error(e);
  }
});

document.getElementById('add-preset-btn').addEventListener('click', async () => {
  if (!project) return;
  // Request write permission BEFORE prompt(); prompt() consumes user activation
  // and would cause requestPermission() to throw.
  if (!(await ensureWritePermission())) {
    logLine('Add preset: write permission was not granted.');
    return;
  }
  let name = (prompt('Name for the new preset:') || '').trim();
  if (!name) return;
  if (name === 'design default values') {
    alert('That name is reserved.');
    return;
  }
  if (project.rawPresetNames.includes(name)) {
    alert(`A preset named "${name}" already exists.`);
    return;
  }
  try {
    if (!(await writePresetToDisk(name))) return;
    project.currentPreset = name;
    rebuildPresetDropdown();
    project.baselineParams = currentFormValues();
    updateDirty();
    updateDelPresetButton();
    logLine(`Added preset "${name}" to ${project.jsonName}`);
  } catch (e) {
    logLine('Add preset failed: ' + e.message);
    console.error(e);
  }
});

// ===== Settings modal wiring =====
const settingsOverlay = document.getElementById('settings-overlay');
const settingsPanel = document.getElementById('settings-panel');
const settingsBtn = document.getElementById('settings-btn');
const settingsCloseBtn = document.getElementById('settings-close-btn');

const SETTINGS_PANELS = {
  general: () => `
    <div class="setting">
      <label>Preset list order</label>
      <label class="opt"><input type="radio" name="presetOrder" value="alphabetical"
        ${settings.presetOrder === 'alphabetical' ? 'checked' : ''}> Alphabetical</label>
      <label class="opt"><input type="radio" name="presetOrder" value="creation"
        ${settings.presetOrder === 'creation' ? 'checked' : ''}> Creation order (newest at the end)</label>
    </div>
    <div class="setting">
      <label>Render backend</label>
      <label class="opt"><input type="radio" name="renderBackend" value="Manifold"
        ${settings.renderBackend === 'Manifold' ? 'checked' : ''}>
        Manifold &mdash; fast (~0.5 s); occasionally leaves a thin floor in cell cuts at certain bar-height combinations</label>
      <label class="opt"><input type="radio" name="renderBackend" value="CGAL"
        ${settings.renderBackend === 'CGAL' ? 'checked' : ''}>
        CGAL &mdash; slow (10&ndash;60 s) but precise; switch to this if you see incomplete cell openings in the viewport</label>

function renderSettingsPanel(cat) {
  settingsPanel.innerHTML = SETTINGS_PANELS[cat]();
  settingsPanel.querySelectorAll('input[type=radio][name=presetOrder]').forEach(r => {
    r.addEventListener('change', () => { if (r.checked) setSetting('presetOrder', r.value); });
  });
  settingsPanel.querySelectorAll('input[type=radio][name=renderBackend]').forEach(r => {
    r.addEventListener('change', () => { if (r.checked) setSetting('renderBackend', r.value); });
  });
}

function openSettings() {
  document.querySelectorAll('#settings-cats .cat').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === 'general');
  });
  renderSettingsPanel('general');
  settingsOverlay.classList.add('open');
}
function closeSettings() { settingsOverlay.classList.remove('open'); }

settingsBtn.addEventListener('click', openSettings);
settingsCloseBtn.addEventListener('click', closeSettings);
settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) closeSettings(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && settingsOverlay.classList.contains('open')) closeSettings();
});
document.querySelectorAll('#settings-cats .cat').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('#settings-cats .cat').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    renderSettingsPanel(c.dataset.cat);
  });
});
